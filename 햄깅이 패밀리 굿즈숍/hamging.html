<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>햄깅이 굿즈 신청서</title>
    <style>
         body {
            font-family: 'Noto Sans KR', sans-serif; /* 깔끔한 글꼴 */
            background-color: #f4f7f6; /* 연한 배경색 */
            display: flex;
            justify-content: center; /* 화면 중앙 정렬 */
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px; /* 둥근 테두리 */
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); /* 그림자 효과 */
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }

        /* 구조 설계: fieldset & legend 스타일 */
        fieldset {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        legend {
            font-weight: bold;
            color: #3498db; /* 포인트 컬러 (파란색) */
            padding: 0 10px;
            font-size: 1.1em;
        }

        /* 입력창 스타일 */
        p { margin: 10px 0; } /* 간격 조절 */

        label {
            display: inline-block;
            width: 90px; /* 라벨 너비 고정으로 입력창 세로 줄 맞춤 */
            font-weight: 500;
            color: #555;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="date"],
        select {
            width: calc(100% - 110px); /* 라벨 빼고 나머지 꽉 채우기 */
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* 패딩 포함 크기 계산 */
        }

        /* 성별 라디오 버튼 스타일 */
        .gender-group label {
            width: auto; /* 성별 라벨은 너비 고정 해제 */
            margin-right: 15px;
            font-weight: normal;
        }

        /* 좋아하는 캐릭터 (가로 정렬) */
        .character-group {
            display: flex;
            justify-content: space-around;
            text-align: center;
            margin-top: 15px;
        }

        .char-item img {
            width: 80px; /* 이미지 크기 고정 */
            height: 80px;
            border-radius: 50%; /* 원형 이미지 */
            border: 2px solid #eee;
            margin-bottom: 10px;
        }

        .char-item label {
            display: block;
            width: auto;
            font-weight: normal;
        }

        /* 버튼 스타일 */
        .btn-group {
            text-align: center;
            margin-top: 30px;
        }

        input[type="submit"],
        input[type="reset"] {
            padding: 10px 25px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            margin: 0 5px;
        }

        input[type="submit"] {
            background-color: #3498db;
            color: white;
        }

        input[type="submit"]:hover { background-color: #2980b9; }

        input[type="reset"] {
            background-color: #e0e0e0;
            color: #333;
        }

        input[type="reset"]:hover { background-color: #d0d0d0; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎁햄깅이 굿즈 신청서🎁</h1>

    <form action="#" method="post">

        <fieldset>
            <legend>기본 정보</legend>

            <p>
                <label for="name">이름</label>
                <input type="text" id="name" name="user_name" required placeholder="햄깅이 (본명)">
            </p>

            <p>
                <label for="phone">연락처</label>
                <input type="text" id="phone" name="user_phone" required placeholder="010-xxxx-xxxx">
            </p>

            <p class="gender-group">
                <label>성별</label>
                <input type="radio" name="gender" id="male" value="m" required> <label for="male">남자</label>
                <input type="radio" name="gender" id="female" value="f"> <label for="female">여자</label>
            </p>

            <p>
                <label for="email">이메일</label>
                <input type="email" id="email" name="user_email" placeholder="hamgingee@hamging.ee">
            </p>

            <p>
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="user_pw" required placeholder="6자리 이상">
            </p>
        </fieldset>

        <fieldset>
            <legend>상세 정보</legend>
            <p>
                <label for="date">가능 날짜</label>
                <input type="date" id="date" name="visit_date" min="2026-03-23" max="2026-03-31" required>
            </p>
            
            <p>
                <label for="time">가능 시간</label>
                <select id="time" name="visit_time" required>
                    <option value="">시간 선택</option>
                    <option value="10:00">오전 10:00</option>
                    <option value="11:00">오전 11:00</option>
                    <option value="12:00">오후 12:00</option>
                    <option value="13:00">오후 01:00</option>
                    <option value="14:00">오후 02:00</option>
                    <option value="15:00">오후 03:00</option>
                </select>
            </p>
            
            <p>
                <label for="목적">방문 목적</label>
                <span class="gender-group">
                    <input type="checkbox" name="purpose" id="p1" value="collection"> <label for="p1">소장용</label>
                    <input type="checkbox" name="purpose" id="p2" value="gift"> <label for="p2">선물용</label>
                    <input type="checkbox" name="purpose" id="p3" value="visit"> <label for="p3">방문</label>
                </span>
            </p>

            <p>
                <label for="수단">방문 수단</label>
                <select id="수단" name="visit_method" required>
                    <option value="">선택</option>
                    <option value="car">차량</option>
                    <option value="public">대중교통</option>
                    <option value="walk">도보</option>
                </select>
            </p>
        </fieldset>

        <fieldset>
            <legend>좋아하는 캐릭터</legend>
            <div class="character-group">
                <div class="char-item">
                    <img src="토낑이.png" alt="토낑이"> <input type="radio" name="character" value="tokking" id="char1" required>
                    <label for="char1">토낑이</label>
                </div>
                <div class="char-item">
                    <img src="./햄깅이.png" alt="햄깅이">
                    <input type="radio" name="character" value="hamging" id="char2">
                    <label for="char2">햄깅이</label>
                </div>
                <div class="char-item">
                    <img src="./햄둥이.png" alt="햄둥이">
                    <input type="radio" name="character" value="hamdung" id="char3">
                    <label for="char3">햄둥이</label>
                </div>
            </div>
        </fieldset>

        <div class="btn-group">
            <input type="submit" value="완료">
            <input type="reset" value="취소">
        </div>

    </form>
</div>

</body>
</html>
